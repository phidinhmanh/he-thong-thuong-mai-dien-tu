          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales/vouchers:
    get:
      tags: [sales]
      summary: List vouchers
      operationId: listVouchers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Voucher list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VoucherResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [sales]
      summary: Create voucher
      operationId: createVoucher
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoucherCreate'
      responses:
        '200':
          description: Voucher created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/sales/vouchers/validate/{code}:
    get:
      tags: [sales]
      summary: Validate voucher code
      operationId: validateVoucher
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: total_amount
          in: query
          required: true
          schema:
            type: number
            format: float
          description: Order total amount for minimum order validation
      responses:
        '200':
          description: Valid voucher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherResponse'
        '400':
          description: Minimum order value not met or voucher usage limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Voucher not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/webhooks/stripe-webhook:
    post:
      tags: [webhooks]
      summary: Receive Stripe webhook
      operationId: stripeWebhook
      parameters:
        - name: stripe-signature
          in: header
          required: false
          schema:
            type: string
          description: Stripe webhook signature header
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                required: [status]
        '400':
          description: Invalid Stripe event or signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ws/{token}:
    get:
      tags: [websocket]
      summary: WebSocket endpoint for realtime notifications
      operationId: websocketEndpoint
      description: |
        Upgrade this endpoint to WebSocket using a valid JWT token in the path.
        Used for order status updates and payment notifications.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols
        '1008':
          description: Invalid token, connection closed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
      required: [detail]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    ImageUploadResponse:
      type: object
      properties:
        image_url:
          type: string
          nullable: true
      required: [image_url]

    UserCreate:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        full_name:
          type: string
          nullable: true
        password:
          type: string
      required: [email, username, password]

    UserLogin:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    UserInDB:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        username:
          type: string
        full_name:
          type: string
          nullable: true
        role:
          type: string
          example: user
        is_active:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [id, email, username, role, is_active, created_at]

    Token:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        user:
          $ref: '#/components/schemas/UserInDB'
      required: [access_token, token_type, user]

    CategoryCreate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        parent_id:
          type: integer
          nullable: true
      required: [name]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        parent_id:
          type: integer
          nullable: true

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        parent_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, name, created_at]

    AdminCategoryResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
          nullable: true
      required: [id, name, slug]

    ProductCreate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
        compare_price:
          type: number
          format: float
          nullable: true
        image_url:
          type: string
          nullable: true
        stock:
          type: integer
          default: 0
        category_id:
          type: integer
          nullable: true
        brand:
          type: string
          nullable: true
        featured:
          type: boolean
          default: false
      required: [name, price]

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
          nullable: true
        compare_price:
          type: number
          format: float
          nullable: true
        image_url:
          type: string
          nullable: true
        stock:
          type: integer
          nullable: true
        category_id:
          type: integer
          nullable: true
        brand:
          type: string
          nullable: true
        featured:
          type: boolean
          nullable: true

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
        compare_price:
          type: number
          format: float
          nullable: true
        image_url:
          type: string
          nullable: true
        stock:
          type: integer
        category_id:
          type: integer
          nullable: true
        brand:
          type: string
          nullable: true
        featured:
          type: boolean
        is_active:
          type: integer
          example: 1
